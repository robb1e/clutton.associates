title: Clutton Associates
tagline: Software leadership, on demand
description: >-
  Clutton Associates Ltd provides fractional engineering leadership,
  focused project work and coaching for technology organisations
  navigating transition and transformation.
url: "https://clutton.associates"
baseurl: ""
author: Robbie Clutton
lang: en-GB

markdown: kramdown
highlighter: rouge
permalink: pretty

plugins:
  - jekyll-sitemap

# Site-wide contact details and links, referenced from layouts and pages.
links:
  calendly:    "https://calendly.com/robbie-clutton/intro"
  email:       "robbie@clutton.associates"
  linkedin:    "https://linkedin.com/in/robbieclutton"
  github:      "https://github.com/robb1e"
  speakerdeck: "https://speakerdeck.com/robb1e"
  blog:        "https://blog.robbieclutton.com"
  personal:    "https://robbieclutton.com"

# Source files that should not be published to the built site.
exclude:
  - offerings.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - bin
  - vendor
  - .github
  - .gitignore

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
